services:
  - type: web
    name: orionsec
    env: python
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build
      pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: MONGO_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://orionsec.onrender.com
    healthCheckPath: /api/health
    autoDeploy: true

  - type: web
    name: orionsec-intel
    env: node
    plan: free
    rootDir: intel-backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://orionsec.onrender.com
    autoDeploy: true
