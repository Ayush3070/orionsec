services:
  - type: web
    name: orionsec
    env: python
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build
      pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: MONGO_URL
        value: mongodb://localhost:27017/orionsec
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://orionsec.onrender.com
    healthCheckPath: /api/health
    autoDeploy: true

  - type: web
    name: orionsec-intel
    env: node
    plan: free
    rootDir: intel-backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URL
        value: mongodb://localhost:27017/orionsec
      - key: CORS_ORIGIN
        value: https://orionsec.onrender.com
    autoDeploy: true

  - type: pserv
    name: mongodb
    env: docker
    plan: free
    runtime: image
    repo: mongo:7
    numInstances: 1
    disk:
      name: mongo-data
      mountPath: /data/db
      sizeGB: 1
    envVars:
      - key: MONGO_INITDB_DATABASE
        value: orionsec
